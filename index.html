<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSUCH KOPER CHAT</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Arial,sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top,#ffe0f2,#f1e7ff 55%,#fff);
}

.box{
width:390px;
height:720px;
background:rgba(255,255,255,.9);
border-radius:34px;
overflow:hidden;
box-shadow:0 25px 70px rgba(120,80,255,.25);
display:flex;
flex-direction:column;
}

.header{
background:linear-gradient(135deg,#ff5fb2,#805cff);
padding:26px;
color:white;
text-align:center;
font-size:30px;
font-weight:900;
}

.heart{
font-size:42px;
margin:8px 0;
animation:pulse 1.3s infinite;
}

.online{
font-size:15px;
font-weight:400;
}

.content{
padding:35px 28px;
text-align:center;
}

.big{
font-size:62px;
animation:pulse 1.5s infinite;
}

h2{
font-size:31px;
margin:18px 0 10px;
color:#2c2c36;
}

p{
color:#666;
font-size:16px;
line-height:1.4;
}

.gender{
display:flex;
gap:12px;
margin:28px 0 18px;
}

button{
border:0;
border-radius:20px;
padding:16px;
font-size:16px;
font-weight:800;
cursor:pointer;
width:100%;
}

.gender button{
background:#f2ecff;
color:#7350c7;
}

.selected{
outline:3px solid #ff5fb2;
background:#ffe1f2!important;
color:#d63384!important;
}

.mainBtn,.send{
background:linear-gradient(135deg,#ff5fb2,#805cff);
color:white;
}

#chat{
display:none;
flex-direction:column;
height:100%;
}

.topBtns{
padding:10px;
background:white;
}

.skip{
background:#111;
color:white;
}

#messages{
flex:1;
overflow:auto;
padding:18px;
background:linear-gradient(#fff7fb,#fff);
}

.msg{
padding:12px 14px;
border-radius:18px;
margin-bottom:10px;
max-width:78%;
word-wrap:break-word;
}

.me{
background:linear-gradient(135deg,#ff78bd,#805cff);
color:white;
margin-left:auto;
border-bottom-right-radius:5px;
}

.other{
background:white;
border:1px solid #eee;
border-bottom-left-radius:5px;
}

.system{
background:#f2ecff;
color:#7350c7;
text-align:center;
margin:10px auto;
max-width:92%;
}

#typing{
height:24px;
padding:0 18px;
color:#9d5cff;
font-size:13px;
font-style:italic;
}

.bottom{
display:flex;
gap:9px;
padding:12px;
background:white;
}

input{
flex:1;
padding:14px;
border-radius:18px;
border:1px solid #ddd;
outline:none;
}

.send{
width:85px;
}

.searching{
text-align:center;
padding:90px 20px;
font-size:24px;
font-weight:900;
color:#8b5cff;
}

.loader{
font-size:60px;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.15);
opacity:.7;
}
}
</style>
</head>

<body>

<div class="box">

<div class="header">
OSUCH KOPER CHAT
<div class="heart">💗</div>
<div class="online">
Online:
<span id="onlineCount">0</span>
</div>
</div>

<div class="content" id="startScreen">

<div class="big">💞</div>

<h2>Poznaj kogoś anonimowo</h2>

<p>
Wybierz swoją płeć i połącz się z prawdziwą osobą online.
</p>

<div class="gender">
<button id="girlBtn">👧 Kobieta</button>
<button id="boyBtn">👦 Mężczyzna</button>
</div>

<button class="mainBtn" id="startBtn">
ROZPOCZNIJ ROZMOWĘ
</button>

</div>

<div id="chat">

<div class="topBtns">
<button class="skip" id="skipBtn">
Pomiń osobę
</button>
</div>

<div id="messages"></div>

<div id="typing"></div>

<div class="bottom">
<input id="messageInput" placeholder="Napisz wiadomość...">
<button class="send" id="sendBtn">
Wyślij
</button>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "TU_WKLEJ_APIKEY",
authDomain: "TU_WKLEJ",
databaseURL: "TU_WKLEJ",
projectId: "TU_WKLEJ",
storageBucket: "TU_WKLEJ",
messagingSenderId: "TU_WKLEJ",
appId: "TU_WKLEJ"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const userId =
Math.random().toString(36).substring(2,9);

let myGender = null;
let currentRoom = null;
let currentPartner = null;
let opened = false;
let typingTimer = null;

const girlBtn =
document.getElementById("girlBtn");

const boyBtn =
document.getElementById("boyBtn");

const startBtn =
document.getElementById("startBtn");

const skipBtn =
document.getElementById("skipBtn");

const sendBtn =
document.getElementById("sendBtn");

const startScreen =
document.getElementById("startScreen");

const chat =
document.getElementById("chat");

const messages =
document.getElementById("messages");

const input =
document.getElementById("messageInput");

const typing =
document.getElementById("typing");

girlBtn.onclick =
()=>selectGender("kobieta");

boyBtn.onclick =
()=>selectGender("mezczyzna");

startBtn.onclick = startChat;
skipBtn.onclick = skipPerson;
sendBtn.onclick = sendMessage;

input.onkeydown = e => {
if(e.key === "Enter")
sendMessage();
};

input.oninput = sendTyping;

function selectGender(g){

myGender = g;

girlBtn.classList.remove("selected");
boyBtn.classList.remove("selected");

if(g === "kobieta"){
girlBtn.classList.add("selected");
}else{
boyBtn.classList.add("selected");
}

}

const onlineRef =
db.ref("online/" + userId);

onlineRef.set({
lastSeen: Date.now()
});

onlineRef.onDisconnect().remove();

setInterval(()=>{

onlineRef.update({
lastSeen: Date.now()
});

},5000);

db.ref("online").on("value",snap=>{

const data = snap.val() || {};

let count = 0;

const now = Date.now();

Object.entries(data).forEach(([id,u])=>{

if(
u &&
u.lastSeen &&
now - u.lastSeen < 15000
){
count++;
}else{
db.ref("online/" + id).remove();
}

});

document.getElementById(
"onlineCount"
).innerText = count;

});

async function startChat(){

if(!myGender){
alert("Wybierz płeć 😭");
return;
}

opened = false;
currentRoom = null;
currentPartner = null;

messages.innerHTML = "";
typing.innerText = "";

await db.ref(
"waiting/" + userId
).remove();

await db.ref(
"matches/" + userId
).remove();

chat.style.display = "none";

startScreen.innerHTML =
'<div class="searching"><div class="loader">💗</div>Szukanie rozmówcy...</div>';

const snap =
await db.ref("waiting").get();

const waiting =
snap.val() || {};

const now = Date.now();

let found = null;

Object.values(waiting).forEach(p=>{

if(
p &&
p.id !== userId &&
p.lastSeen &&
now - p.lastSeen < 15000 &&
!found
){
found = p;
}

});

if(found){

const roomId =
[userId,found.id]
.sort()
.join("_");

await db.ref(
"waiting/" + found.id
).remove();

await db.ref(
"rooms/" + roomId
).set({

presence:{
[userId]:true,
[found.id]:true
}

});

await db.ref(
"matches/" + found.id
).set({

room:roomId,
partnerId:userId,
partnerGender:myGender

});

await db.ref(
"matches/" + userId
).set({

room:roomId,
partnerId:found.id,
partnerGender:found.gender

});

return;

}

await db.ref(
"waiting/" + userId
).set({

id:userId,
gender:myGender,
lastSeen:Date.now()

});

db.ref(
"waiting/" + userId
).onDisconnect().remove();

setInterval(()=>{

if(!currentRoom){

db.ref(
"waiting/" + userId
).update({

lastSeen:Date.now()

});

}

},5000);

}

db.ref(
"matches/" + userId
).on("value",async snap=>{

const match = snap.val();

if(match && !opened){

opened = true;

currentRoom = match.room;

currentPartner = match.partnerId;

await db.ref(
"waiting/" + userId
).remove();

await db.ref(
"rooms/" +
currentRoom +
"/presence/" +
userId
).set(true);

db.ref(
"rooms/" +
currentRoom +
"/presence/" +
userId
).onDisconnect().set(false);

openChat(
match.partnerGender
);

}

});

function openChat(gender){

startScreen.style.display =
"none";

chat.style.display = "flex";

messages.innerHTML =
'<div class="msg system">💕 Połączono z ' +
(gender === "kobieta"
? "dziewczyną"
: "chłopakiem") +
'</div>';

listenMessages();
listenTyping();
watchPartner();

}

function listenMessages(){

db.ref(
"rooms/" +
currentRoom +
"/messages"
).off();

db.ref(
"rooms/" +
currentRoom +
"/messages"
).on(
"child_added",
snap=>{

const msg = snap.val();

if(!msg || !msg.text)
return;

const div =
document.createElement("div");

div.className =
msg.user === userId
? "msg me"
: "msg other";

div.innerText = msg.text;

messages.appendChild(div);

messages.scrollTop =
messages.scrollHeight;

});

}

function sendTyping(){

if(!currentRoom)
return;

db.ref(
"rooms/" +
currentRoom +
"/typing/" +
userId
).set({

typing:true,
time:Date.now()

});

clearTimeout(typingTimer);

typingTimer =
setTimeout(()=>{

if(currentRoom){

db.ref(
"rooms/" +
currentRoom +
"/typing/" +
userId
).set({

typing:false,
time:Date.now()

});

}

},1200);

}

function listenTyping(){

db.ref(
"rooms/" +
currentRoom +
"/typing/" +
currentPartner
).on("value",snap=>{

const data = snap.val();

if(
data &&
data.typing &&
Date.now() - data.time < 3000
){

typing.innerText =
"Rozmówca pisze...";

}else{

typing.innerText = "";

}

});

}

function watchPartner(){

db.ref(
"rooms/" +
currentRoom +
"/presence/" +
currentPartner
).on("value",snap=>{

if(
snap.val() === false &&
currentRoom
){

currentRoom = null;

typing.innerText = "";

const div =
document.createElement("div");

div.className = "msg system";

div.innerText =
"❌ Rozmówca opuścił czat";

messages.appendChild(div);

const btn =
document.createElement("button");

btn.innerText =
"Szukaj nowej osoby";

btn.onclick = startChat;

messages.appendChild(btn);

}

});

}

async function sendMessage(){

const text =
input.value.trim();

if(!text)
return;

if(!currentRoom){

alert(
"Nie jesteś teraz połączona z rozmówcą 😭"
);

return;

}

await db.ref(
"rooms/" +
currentRoom +
"/typing/" +
userId
).set({

typing:false,
time:Date.now()

});

await db.ref(
"rooms/" +
currentRoom +
"/messages"
).push({

user:userId,
text:text,
time:Date.now()

});

input.value = "";

}

async function skipPerson(){

if(currentRoom){

await db.ref(
"rooms/" +
currentRoom +
"/typing/" +
userId
).set({

typing:false,
time:Date.now()

});

await db.ref(
"rooms/" +
currentRoom +
"/presence/" +
userId
).set(false);

}

await db.ref(
"matches/" + userId
).remove();

startChat();

}

</script>

</body>
</html>
