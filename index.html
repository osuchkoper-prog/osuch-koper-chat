<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OSUCH KOPER CHAT</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#ffe6f5,#f0e9ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.box{
width:390px;
height:760px;
background:white;
border-radius:40px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
position:relative;
}

.top{
background:linear-gradient(135deg,#ff5ebc,#7a5cff);
padding:35px 20px 25px;
text-align:center;
color:white;
}

.top h1{
margin:0;
font-size:42px;
font-weight:900;
line-height:1.1;
}

.online{
margin-top:12px;
font-size:18px;
opacity:0.95;
}

.main{
flex:1;
padding:30px 25px;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
overflow-y:auto;
}

.hearts{
font-size:60px;
margin-top:10px;
}

.title{
font-size:55px;
font-weight:900;
text-align:center;
margin-top:15px;
line-height:1;
color:#222;
}

.desc{
margin-top:20px;
font-size:23px;
text-align:center;
color:#555;
line-height:1.4;
}

.gender-box{
display:flex;
gap:15px;
width:100%;
margin-top:35px;
}

.gender{
flex:1;
padding:20px;
border-radius:25px;
background:#f3f3ff;
border:none;
font-size:24px;
font-weight:700;
cursor:pointer;
transition:0.2s;
}

.gender.active{
background:linear-gradient(135deg,#ff5ebc,#7a5cff);
color:white;
transform:scale(1.05);
}

.start{
margin-top:25px;
width:100%;
padding:22px;
border:none;
border-radius:25px;
background:linear-gradient(135deg,#ff5ebc,#7a5cff);
color:white;
font-size:28px;
font-weight:900;
cursor:pointer;
}

.system{
margin-top:18px;
font-size:20px;
text-align:center;
color:#777;
min-height:30px;
}

.chat{
display:none;
flex-direction:column;
height:100%;
width:100%;
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
background:white;
}

.msg{
padding:14px 18px;
border-radius:18px;
margin-bottom:12px;
max-width:75%;
font-size:19px;
word-wrap:break-word;
}

.me{
background:#ff5ebc;
color:white;
margin-left:auto;
}

.other{
background:#eee;
color:#222;
}

.input-box{
display:flex;
padding:15px;
gap:10px;
background:white;
border-top:1px solid #eee;
}

.input{
flex:1;
padding:16px;
border-radius:18px;
border:none;
background:#f2f2f2;
font-size:18px;
outline:none;
}

.send{
padding:16px 22px;
border:none;
border-radius:18px;
background:#7a5cff;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.skip{
margin:12px;
padding:16px;
border:none;
border-radius:18px;
background:#111;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

#typing{
font-size:16px;
color:#888;
height:20px;
padding-left:10px;
}

</style>
</head>

<body>

<div class="box">

<div class="top">
<h1>OSUCH KOPER CHAT 💖</h1>
<div class="online" id="online">Online: 1</div>
</div>

<div class="main" id="startScreen">

<div class="hearts">💞</div>

<div class="title">
Poznaj kogoś anonimowo
</div>

<div class="desc">
Wybierz swoją płeć i połącz się z losową osobą.
</div>

<div class="gender-box">
<button class="gender" id="girlBtn" onclick="selectGender('girl',this)">👱‍♀️ Kobieta</button>
<button class="gender" id="boyBtn" onclick="selectGender('boy',this)">👱‍♂️ Mężczyzna</button>
</div>

<button class="start" onclick="startChat()">
ROZPOCZNIJ ROZMOWĘ
</button>

<div class="system" id="status"></div>

</div>

<div class="chat" id="chatScreen">

<div class="messages" id="messages"></div>

<div id="typing"></div>

<div class="input-box">
<input class="input" id="messageInput" placeholder="Napisz wiadomość...">
<button class="send" onclick="sendMessage()">Wyślij</button>
</div>

<button class="skip" onclick="skipChat()">Pomiń rozmowę</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded,
remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "TU_WKLEJ",

authDomain: "TU_WKLEJ",

databaseURL: "TU_WKLEJ",

projectId: "TU_WKLEJ",

storageBucket: "TU_WKLEJ",

messagingSenderId: "TU_WKLEJ",

appId: "TU_WKLEJ"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let gender = "";
let room = null;
let userId = Math.random().toString(36).substring(2,9);

window.selectGender = function(g,btn){

gender = g;

document.querySelectorAll(".gender").forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

}

function updateOnline(){

set(ref(db,"online/"+userId),true);

onValue(ref(db,"online"),snap=>{

const data = snap.val() || {};

document.getElementById("online").innerText =
"Online: " + Object.keys(data).length;

});

}

updateOnline();

window.startChat = function(){

if(!gender){
alert("Wybierz płeć 😭");
return;
}

document.getElementById("status").innerText =
"🔎 Szukanie rozmówcy...";

onValue(ref(db,"waiting"),snap=>{

const waiting = snap.val();

if(waiting){

const otherId = Object.keys(waiting)
.find(id => id !== userId);

if(otherId){

room = [userId,otherId].sort().join("_");

set(ref(db,"rooms/"+room+"/connected"),true);

remove(ref(db,"waiting/"+otherId));
remove(ref(db,"waiting/"+userId));

openChat();

}

else{

set(ref(db,"waiting/"+userId),{
gender
});

}

}

else{

set(ref(db,"waiting/"+userId),{
gender
});

}

});

}

function openChat(){

document.getElementById("startScreen").style.display="none";

document.getElementById("chatScreen").style.display="flex";

listenMessages();

document.getElementById("messages").innerHTML +=
'<div class="msg other">💖 Połączono z nową osobą</div>';

}

function listenMessages(){

onChildAdded(ref(db,"messages/"+room),snap=>{

const data = snap.val();

const div = document.createElement("div");

div.className =
data.user === userId ? "msg me" : "msg other";

div.innerText = data.text;

document.getElementById("messages").appendChild(div);

});

}

window.sendMessage = function(){

const input = document.getElementById("messageInput");

if(!input.value.trim()) return;

push(ref(db,"messages/"+room),{
text:input.value,
user:userId
});

input.value="";

}

window.skipChat = function(){

location.reload();

}

</script>

</body>
</html>
