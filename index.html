<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSUCH KOPER CHAT</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#ffe6f5,#efe4ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.box{
width:380px;
height:700px;
background:white;
border-radius:35px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
}

.header{
background:linear-gradient(135deg,#ff4fa3,#7a5cff);
padding:25px;
text-align:center;
color:white;
font-weight:900;
font-size:34px;
}

.online{
font-size:15px;
margin-top:10px;
}

.content{
padding:30px;
text-align:center;
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
}

.bigHeart{
font-size:70px;
}

h1{
font-size:55px;
margin:10px 0;
line-height:1;
}

p{
font-size:20px;
color:#666;
}

.gender{
display:flex;
gap:10px;
margin-top:20px;
}

.gender button{
flex:1;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:bold;
background:#f4f0ff;
cursor:pointer;
}

.selected{
background:#ffd5ec!important;
}

.mainBtn{
margin-top:20px;
padding:22px;
border:none;
border-radius:20px;
font-size:24px;
font-weight:bold;
background:linear-gradient(135deg,#ff4fa3,#7a5cff);
color:white;
cursor:pointer;
}

#chat{
display:none;
flex-direction:column;
height:100%;
}

#messages{
flex:1;
overflow:auto;
padding:15px;
background:#fff9fd;
}

.msg{
padding:12px 16px;
border-radius:18px;
margin-bottom:10px;
max-width:75%;
word-wrap:break-word;
font-size:18px;
}

.me{
background:linear-gradient(135deg,#ff4fa3,#7a5cff);
color:white;
margin-left:auto;
}

.other{
background:#f0f0f0;
}

.system{
background:#efe4ff;
text-align:center;
margin:auto;
}

.bottom{
display:flex;
padding:12px;
gap:10px;
background:white;
}

input{
flex:1;
padding:15px;
border-radius:16px;
border:1px solid #ddd;
font-size:18px;
}

.send{
padding:15px 20px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#ff4fa3,#7a5cff);
color:white;
font-weight:bold;
font-size:18px;
cursor:pointer;
}

.skip{
margin:10px;
padding:14px;
border:none;
border-radius:16px;
background:black;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#typing{
height:20px;
font-size:14px;
padding-left:20px;
color:#888;
}

</style>
</head>

<body>

<div class="box">

<div class="header">
OSUCH KOPER CHAT 💖
<div class="online">
Online: <span id="onlineCount">0</span>
</div>
</div>

<div class="content" id="start">

<div class="bigHeart">💞</div>

<h1>Poznaj kogoś anonimowo</h1>

<p>Wybierz swoją płeć i połącz się z losową osobą.</p>

<div class="gender">
<button id="girlBtn">👧 Kobieta</button>
<button id="boyBtn">👦 Mężczyzna</button>
</div>

<button class="mainBtn" id="startBtn">
ROZPOCZNIJ ROZMOWĘ
</button>

</div>

<div id="chat">

<button class="skip" id="skipBtn">
Pomiń osobę
</button>

<div id="messages"></div>

<div id="typing"></div>

<div class="bottom">
<input id="messageInput" placeholder="Napisz wiadomość...">
<button class="send" id="sendBtn">
Wyślij
</button>
</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {

apiKey: "AIzaSyAVdGNoc6K0nNxHwV55kEISwQHSE1yU6jI",
authDomain: "osuch-koper-chat-d40cc.firebaseapp.com",
databaseURL: "https://osuch-koper-chat-d40cc-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "osuch-koper-chat-d40cc",
storageBucket: "osuch-koper-chat-d40cc.firebasestorage.app",
messagingSenderId: "235610584615",
appId: "1:235610584615:web:325cd704fc71a321148002"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

const userId =
Math.random().toString(36).substring(2,9);

let gender = "";
let room = null;

const girlBtn =
document.getElementById("girlBtn");

const boyBtn =
document.getElementById("boyBtn");

girlBtn.onclick = () => {
gender = "kobieta";
girlBtn.classList.add("selected");
boyBtn.classList.remove("selected");
};

boyBtn.onclick = () => {
gender = "mezczyzna";
boyBtn.classList.add("selected");
girlBtn.classList.remove("selected");
};

document.getElementById("onlineCount")
.innerText = 1;

document.getElementById("startBtn")
.onclick = async () => {

if(!gender){
alert("Wybierz płeć 😭");
return;
}

document.getElementById("start")
.style.display = "none";

document.getElementById("chat")
.style.display = "flex";

document.getElementById("messages")
.innerHTML =
'<div class="msg system">💕 Połączono z rozmówcą</div>';

};

document.getElementById("sendBtn")
.onclick = sendMessage;

document.getElementById("messageInput")
.addEventListener("keydown",e=>{

if(e.key==="Enter"){
sendMessage();
}

});

function sendMessage(){

const input =
document.getElementById("messageInput");

const text =
input.value.trim();

if(!text) return;

const div =
document.createElement("div");

div.className = "msg me";

div.innerText = text;

document.getElementById("messages")
.appendChild(div);

input.value = "";

}

</script>

</body>
</html>
