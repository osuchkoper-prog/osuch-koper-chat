<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSUCH KOPER CHAT</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
height:100vh;
background:linear-gradient(180deg,#ffe6f5,#f0e9ff);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.chat-container{
width:100%;
max-width:420px;
height:100vh;
background:white;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:linear-gradient(90deg,#ff5fb2,#7b61ff);
padding:25px;
text-align:center;
color:white;
font-size:24px;
font-weight:900;
flex-shrink:0;
}

.online{
margin-top:8px;
font-size:15px;
}

.start-screen{
flex:1;
overflow:auto;
}

.content{
padding:25px;
text-align:center;
}

.big-heart{
font-size:65px;
margin:15px 0;
}

.title{
font-size:46px;
font-weight:900;
line-height:1;
margin-bottom:18px;
color:#222;
}

.subtitle{
font-size:18px;
color:#666;
margin-bottom:30px;
}

.gender-buttons{
display:flex;
gap:12px;
margin-bottom:25px;
}

.gender-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:700;
background:#f3f1ff;
cursor:pointer;
transition:0.2s;
}

.gender-btn.active{
background:#7b61ff;
color:white;
}

.start-btn{
width:100%;
padding:20px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#ff5fb2,#7b61ff);
color:white;
font-size:22px;
font-weight:900;
cursor:pointer;
}

.chat-box{
display:none;
flex-direction:column;
height:100%;
}

.messages{
flex:1;
overflow-y:auto;
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
padding:14px 18px;
border-radius:18px;
max-width:75%;
font-size:17px;
word-wrap:break-word;
}

.me{
background:#7b61ff;
color:white;
align-self:flex-end;
}

.other{
background:#efefef;
color:#222;
align-self:flex-start;
}

#typing{
height:22px;
padding:0 20px 10px;
font-size:14px;
color:#888;
}

.input-area{
display:flex;
gap:10px;
padding:14px;
border-top:1px solid #eee;
background:white;
}

.input-area input{
flex:1;
padding:15px;
border-radius:15px;
border:1px solid #ddd;
font-size:16px;
outline:none;
}

.send-btn{
padding:15px 18px;
border:none;
border-radius:15px;
background:#ff5fb2;
color:white;
font-weight:700;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="start-screen" id="startScreen">

<div class="header">
OSUCH KOPER CHAT 💖
<div class="online">
Online: 1
</div>
</div>

<div class="content">

<div class="big-heart">💕</div>

<div class="title">
Poznaj kogoś anonimowo
</div>

<div class="subtitle">
Wybierz swoją płeć i połącz się z losową osobą.
</div>

<div class="gender-buttons">

<button class="gender-btn" id="girlBtn">
👱‍♀️ Kobieta
</button>

<button class="gender-btn" id="boyBtn">
👱‍♂️ Mężczyzna
</button>

</div>

<button class="start-btn" id="startBtn">
ROZPOCZNIJ ROZMOWĘ
</button>

</div>

</div>

<div class="chat-box" id="chatBox">

<div class="header">
Połączono 💕
</div>

<div class="messages" id="messages"></div>

<div id="typing"></div>

<div class="input-area">

<input
type="text"
id="messageInput"
placeholder="Napisz wiadomość..."


<button class="send-btn" id="sendBtn">
Wyślij
</button>

</div>

</div>

</div>

<script>

let gender = "";

const girlBtn =
document.getElementById("girlBtn");

const boyBtn =
document.getElementById("boyBtn");

const startBtn =
document.getElementById("startBtn");

const sendBtn =
document.getElementById("sendBtn");

girlBtn.addEventListener("click",()=>{

gender = "k";

girlBtn.classList.add("active");
boyBtn.classList.remove("active");

});

boyBtn.addEventListener("click",()=>{

gender = "m";

boyBtn.classList.add("active");
girlBtn.classList.remove("active");

});

startBtn.addEventListener("click",()=>{

if(gender === ""){
alert("Wybierz płeć 💕");
return;
}

document.getElementById("startScreen")
.style.display = "none";

document.getElementById("chatBox")
.style.display = "flex";

addMessage("other","Hej 💕");

});

sendBtn.addEventListener("click",sendMessage);

document
.getElementById("messageInput")
.addEventListener("keypress",(e)=>{

if(e.key === "Enter"){
sendMessage();
}

});

function sendMessage(){

const input =
document.getElementById("messageInput");

const text = input.value.trim();

if(text === "") return;

addMessage("me",text);

input.value = "";

document.getElementById("typing")
.innerText = "Rozmówca pisze...";

setTimeout(()=>{

document.getElementById("typing")
.innerText = "";

const replies = [
"Hej 😭",
"Co tam?",
"Haha 💀",
"💕",
"Skąd jesteś?",
"Miło się gada"
];

const reply =
replies[Math.floor(Math.random()*replies.length)];

addMessage("other",reply);

},1200);

}

function addMessage(type,text){

const messages =
document.getElementById("messages");

const div =
document.createElement("div");

div.classList.add("message");

if(type === "me"){
div.classList.add("me");
}else{
div.classList.add("other");
}

div.innerText = text;

messages.appendChild(div);

messages.scrollTop =
messages.scrollHeight;

}

</script>

</body>
</html>
