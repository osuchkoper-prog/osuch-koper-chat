<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OSUCH KOPER CHAT</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#ffe6f5,#f0e9ff);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:auto;
}

.chat-container{
width:370px;
max-width:95%;
height:90vh;
background:white;
border-radius:35px;
overflow-y:auto;
box-shadow:0 10px 35px rgba(0,0,0,0.15);
}

.header{
background:linear-gradient(90deg,#ff5fb2,#7b61ff);
padding:30px 20px;
text-align:center;
color:white;
font-weight:900;
font-size:22px;
border-radius:35px 35px 0 0;
}

.online{
margin-top:10px;
font-size:17px;
font-weight:500;
}

.content{
padding:30px;
text-align:center;
}

.big-heart{
font-size:60px;
margin-bottom:20px;
}

.title{
font-size:58px;
font-weight:900;
line-height:1;
margin-bottom:20px;
color:#222;
}

.subtitle{
font-size:18px;
color:#666;
margin-bottom:35px;
}

.gender-buttons{
display:flex;
gap:15px;
margin-bottom:25px;
}

.gender-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:700;
background:#f4f4ff;
cursor:pointer;
transition:0.2s;
}

.gender-btn:hover{
transform:scale(1.03);
}

.start-btn{
width:100%;
padding:22px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#ff5fb2,#7b61ff);
color:white;
font-size:24px;
font-weight:900;
cursor:pointer;
margin-bottom:20px;
}

.chat-box{
display:none;
flex-direction:column;
height:100%;
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
height:500px;
}

.message{
padding:14px 18px;
border-radius:18px;
max-width:75%;
word-wrap:break-word;
font-size:17px;
}

.me{
background:#7b61ff;
color:white;
align-self:flex-end;
}

.other{
background:#eee;
color:#222;
align-self:flex-start;
}

.input-area{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid #eee;
}

.input-area input{
flex:1;
padding:15px;
border-radius:15px;
border:1px solid #ddd;
font-size:16px;
}

.send-btn{
padding:15px 20px;
border:none;
border-radius:15px;
background:#ff5fb2;
color:white;
font-weight:700;
cursor:pointer;
}

#typing{
font-size:15px;
color:#888;
padding:0 20px 10px;
height:20px;
}

@media(max-width:600px){

.chat-container{
width:100%;
height:100vh;
border-radius:0;
}

.header{
border-radius:0;
}

.title{
font-size:42px;
}

}
</style>
</head>

<body>

<div class="chat-container">

<div id="startScreen">

<div class="header">
OSUCH KOPER CHAT 💖
<div class="online">Online: <span id="onlineCount">1</span></div>
</div>

<div class="content">

<div class="big-heart">💕</div>

<div class="title">
Poznaj kogoś anonimowo
</div>

<div class="subtitle">
Wybierz swoją płeć i połącz się z losową osobą.
</div>

<div class="gender-buttons">
<button class="gender-btn" onclick="selectGender('k')">
👱‍♀️ Kobieta
</button>

<button class="gender-btn" onclick="selectGender('m')">
👱‍♂️ Mężczyzna
</button>
</div>

<button class="start-btn" onclick="startChat()">
ROZPOCZNIJ ROZMOWĘ
</button>

</div>
</div>

<div class="chat-box" id="chatBox">

<div class="header">
Połączono 💕
</div>

<div class="messages" id="messages"></div>

<div id="typing"></div>

<div class="input-area">
<input type="text" id="messageInput" placeholder="Napisz wiadomość...">
<button class="send-btn" onclick="sendMessage()">Wyślij</button>
</div>

</div>

</div>

<script>

let gender = "";
let connected = false;

function selectGender(g){
gender = g;
}

function startChat(){

if(!gender){
alert("Wybierz płeć 💕");
return;
}

document.getElementById("startScreen").style.display = "none";
document.getElementById("chatBox").style.display = "flex";

connected = true;

addMessage("System", "Połączono z rozmówcą 💕");

}

function sendMessage(){

let input = document.getElementById("messageInput");

if(input.value.trim() === "") return;

addMessage("me", input.value);

let text = input.value;

input.value = "";

document.getElementById("typing").innerText = "Rozmówca pisze...";

setTimeout(()=>{

document.getElementById("typing").innerText = "";

addMessage("other","Haha 😭");

},1500);

}

function addMessage(type,text){

let messages = document.getElementById("messages");

let div = document.createElement("div");

if(type === "me"){
div.className = "message me";
div.innerText = text;
}else{
div.className = "message other";
div.innerText = text;
}

messages.appendChild(div);

messages.scrollTop = messages.scrollHeight;

}

</script>

</body>
</html>
