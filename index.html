<head>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#ffe6f5,#f6e9ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.chat-container{
width:370px;
height:760px;
background:white;
border-radius:35px;
overflow:hidden;
box-shadow:0 10px 35px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
}

.top{
background:linear-gradient(135deg,#ff5fb7,#7a5cff);
padding:35px 20px;
text-align:center;
color:white;
}

.top h1{
margin:0;
font-size:42px;
font-weight:900;
letter-spacing:2px;
}

.online{
margin-top:12px;
font-size:20px;
opacity:0.95;
}

.main{
flex:1;
padding:30px 20px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
}

.heart{
font-size:70px;
margin-top:10px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.title{
font-size:46px;
font-weight:900;
text-align:center;
margin-top:15px;
color:#222;
line-height:1.1;
}

.subtitle{
font-size:22px;
text-align:center;
color:#666;
margin-top:20px;
line-height:1.4;
}

.gender-box{
display:flex;
gap:15px;
margin-top:35px;
width:100%;
}

.gender-btn{
flex:1;
border:none;
padding:20px;
border-radius:20px;
background:#f5f1ff;
font-size:24px;
font-weight:700;
cursor:pointer;
transition:0.2s;
}

.gender-btn:hover{
transform:scale(1.04);
}

.selected{
background:linear-gradient(135deg,#ff5fb7,#7a5cff);
color:white;
}

.start-btn{
margin-top:25px;
width:100%;
border:none;
padding:22px;
border-radius:22px;
background:linear-gradient(135deg,#ff5fb7,#7a5cff);
color:white;
font-size:26px;
font-weight:900;
cursor:pointer;
transition:0.2s;
}

.start-btn:hover{
transform:scale(1.03);
}

.info{
margin-top:18px;
font-size:16px;
color:#888;
text-align:center;
}

#messages{
flex:1;
width:100%;
overflow-y:auto;
padding:10px;
}

.msg{
padding:14px 18px;
border-radius:20px;
margin:8px 0;
max-width:75%;
font-size:18px;
word-wrap:break-word;
}

.me{
background:#ff5fb7;
color:white;
margin-left:auto;
}

.other{
background:#f1f1f1;
color:#222;
}

.system{
background:#eef0ff;
color:#666;
text-align:center;
margin:auto;
}

.bottom{
display:flex;
padding:15px;
gap:10px;
border-top:1px solid #eee;
}

#messageInput{
flex:1;
padding:18px;
border-radius:20px;
border:none;
background:#f5f5f5;
font-size:18px;
outline:none;
}

.send-btn{
border:none;
padding:18px 22px;
border-radius:18px;
background:linear-gradient(135deg,#ff5fb7,#7a5cff);
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
}

.skip-btn{
margin-top:12px;
border:none;
padding:16px;
border-radius:18px;
background:#111;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
width:100%;
}

#typing{
font-size:15px;
color:#888;
margin-top:5px;
height:20px;
}
</style>

</head>
