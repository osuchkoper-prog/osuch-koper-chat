<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OSUCH KOPER CHAT</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#ffe6f5,#f2e7ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.chat-container{
width:380px;
height:760px;
background:white;
border-radius:35px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
}

.top{
background:linear-gradient(135deg,#ff5fb7,#7a5cff);
padding:35px 20px;
text-align:center;
color:white;
}

.top h1{
margin:0;
font-size:32px;
font-weight:900;
}

.online{
margin-top:10px;
font-size:18px;
}

.main{
flex:1;
padding:25px;
display:flex;
flex-direction:column;
align-items:center;
overflow:hidden;
}

.heart{
font-size:60px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

.title{
font-size:42px;
font-weight:900;
text-align:center;
line-height:1.1;
margin-top:15px;
color:#222;
}

.subtitle{
font-size:20px;
text-align:center;
color:#666;
margin-top:15px;
}

.gender-box{
display:flex;
gap:15px;
width:100%;
margin-top:30px;
}

.gender-btn{
flex:1;
padding:18px;
border:none;
border-radius:18px;
background:#f4f1ff;
font-size:20px;
font-weight:700;
cursor:pointer;
transition:0.2s;
}

.gender-btn:hover{
transform:scale(1.03);
}

.selected{
background:linear-gradient(135deg,#ff5fb7,#7a5cff);
color:white;
}

.start-btn{
margin-top:25px;
width:100%;
padding:20px;
border:none;
border-radius:20px;
background:linear-gradient(135deg,#ff5fb7,#7a5cff);
color:white;
font-size:22px;
font-weight:900;
cursor:pointer;
}

#messages{
flex:1;
width:100%;
overflow-y:auto;
margin-top:20px;
padding-right:5px;
}

.msg{
padding:14px 18px;
border-radius:20px;
margin:8px 0;
max-width:75%;
font-size:17px;
word-wrap:break-word;
}

.me{
background:#ff5fb7;
color:white;
margin-left:auto;
}

.other{
background:#f1f1f1;
color:#222;
}

.system{
background:#eef0ff;
color:#666;
margin:auto;
text-align:center;
}

.bottom{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid #eee;
}

#messageInput{
flex:1;
padding:16px;
border:none;
border-radius:18px;
background:#f5f5f5;
font-size:17px;
outline:none;
}

.send-btn{
padding:16px 20px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#ff5fb7,#7a5cff);
color:white;
font-weight:700;
cursor:pointer;
}

.skip-btn{
margin-top:10px;
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:#111;
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
}

#typing{
height:20px;
font-size:14px;
color:#888;
margin-top:5px;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="top">
<h1>OSUCH KOPER CHAT 💗</h1>
<div class="online" id="onlineCount">Online: 1</div>
</div>

<div class="main" id="main">

<div class="heart">💞</div>

<div class="title">
Poznaj kogoś anonimowo
</div>

<div class="subtitle">
Wybierz swoją płeć i połącz się z losową osobą.
</div>

<div class="gender-box">
<button class="gender-btn" onclick="selectGender('girl',this)">
👱‍♀️ Kobieta
</button>

<button class="gender-btn" onclick="selectGender('boy',this)">
👱‍♂️ Mężczyzna
</button>
</div>

<button class="start-btn" onclick="startChat()">
ROZPOCZNIJ ROZMOWĘ
</button>

<div id="messages" style="display:none;"></div>

<div id="typing"></div>

</div>

<div class="bottom" id="chatBottom" style="display:none;">
<input id="messageInput" placeholder="Napisz wiadomość..." oninput="typing()">

<button class="send-btn" onclick="sendMessage()">
Wyślij
</button>
</div>

<button class="skip-btn" id="skipBtn" style="display:none;" onclick="skipChat()">
Pomiń osobę
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
push,
onValue,
onChildAdded,
remove
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyAVdGNoc6K0nNxHwV55kEISwQHSE1yU6jI",
    authDomain: "osuch-koper-chat-d40cc.firebaseapp.com",
    databaseURL: "https://osuch-koper-chat-d40cc-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "osuch-koper-chat-d40cc",
    storageBucket: "osuch-koper-chat-d40cc.firebasestorage.app",
    messagingSenderId: "235610584615",
    appId: "1:235610584615:web:7440dddb027b624e148002",
    measurementId: "G-HWN36NKDD6"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let gender = "";
let room = null;
let userId = Math.random().toString(36).substring(2,9);

window.selectGender = function(g,btn){

gender = g;

document.querySelectorAll(".gender-btn")
.forEach(b=>b.classList.remove("selected"));

btn.classList.add("selected");

}

set(ref(db,"online/"+userId),true);

window.addEventListener("beforeunload",()=>{
remove(ref(db,"online/"+userId));
});

onValue(ref(db,"online"),(snap)=>{

const data = snap.val() || {};
const count = Object.keys(data).length;

document.getElementById("onlineCount").innerText =
"Online: "+count;

});

window.startChat = async function(){

if(!gender){
alert("Wybierz płeć 😭");
return;
}

room = "room_"+Math.floor(Math.random()*100000);

document.getElementById("messages").style.display="block";
document.getElementById("chatBottom").style.display="flex";
document.getElementById("skipBtn").style.display="block";

document.querySelector(".heart").style.display="none";
document.querySelector(".title").style.display="none";
document.querySelector(".subtitle").style.display="none";
document.querySelector(".gender-box").style.display="none";
document.querySelector(".start-btn").style.display="none";

const div = document.createElement("div");
div.className="msg system";
div.innerText="💘 Połączono z rozmówcą";
document.getElementById("messages").appendChild(div);

listenMessages();

}

function listenMessages(){

onChildAdded(ref(db,"messages/"+room),(snap)=>{

const msg = snap.val();

const div = document.createElement("div");

div.className =
msg.user===userId ? "msg me" : "msg other";

div.innerText = msg.text;

document.getElementById("messages").appendChild(div);

document.getElementById("messages").scrollTop =
document.getElementById("messages").scrollHeight;

});

}

window.sendMessage = function(){

const input = document.getElementById("messageInput");

const text = input.value.trim();

if(text==="") return;

push(ref(db,"messages/"+room),{

user:userId,
text:text

});

input.value="";

}

window.skipChat = function(){

document.getElementById("messages").innerHTML="";

const div = document.createElement("div");

div.className="msg system";
div.innerText="🔎 Szukanie nowej osoby...";

document.getElementById("messages").appendChild(div);

setTimeout(()=>{

document.getElementById("messages").innerHTML="";

const div2 = document.createElement("div");

div2.className="msg system";
div2.innerText="💘 Połączono z nową osobą";

document.getElementById("messages").appendChild(div2);

},2000);

}

window.typing = function(){

document.getElementById("typing").innerText =
"✍️ ktoś pisze...";

clearTimeout(window.typingTimeout);

window.typingTimeout = setTimeout(()=>{

document.getElementById("typing").innerText="";

},1000);

}

</script>

</body>
</html>
